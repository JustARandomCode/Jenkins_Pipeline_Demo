<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    background: #0a0a0f;
    color: #fff;
    overflow: hidden;
}

/* Background glow */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,0,150,0.25), transparent 70%);
    top: -200px;
    left: -200px;
    filter: blur(80px);
}

/* Layout */
.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100%;
    padding: 60px;
}

/* Left section */
.left {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.left h1 {
    font-size: 4rem;
    line-height: 1.1;
    font-weight: 700;
    background: linear-gradient(90deg, #ff0080, #7928ca);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.left p {
    margin-top: 20px;
    color: #aaa;
    max-width: 400px;
}

/* Button */
.btn {
    margin-top: 40px;
    width: fit-content;
    padding: 14px 30px;
    border-radius: 40px;
    border: none;
    background: linear-gradient(135deg, #ff0080, #7928ca);
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s ease;
}

.btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 0 30px rgba(255,0,150,0.6);
}

/* Right floating card */
.right {
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 320px;
    height: 420px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 30px;
    transition: 0.4s ease;
    position: relative;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 25px;
    background: linear-gradient(135deg, transparent, rgba(255,0,150,0.4));
    opacity: 0;
    transition: 0.4s;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: rotate(-2deg) scale(1.05);
}

/* Cursor glow */
.cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(255,0,150,0.8);
    pointer-events: none;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
    transition: transform 0.1s ease;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="container">
    <div class="left">
        <h1>Built to pull attention.</h1>
        <p>Not loud. Not crowded. Just enough to make people stop scrolling. PS THIS IS THE NEW COMMIT</p>
        <button class="btn">Enter</button>
    </div>

    <div class="right">
        <div class="card">
            <h2>Control</h2>
            <p style="margin-top:10px;color:#bbb;">
                Every pixel has a reason. Everything else is noise.
            </p>
        </div>
    </div>
</div>

<script>
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
